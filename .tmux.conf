set -g prefix C-s
unbind r
bind r source-file ~/.tmux.conf


setw -g mode-keys vi
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set-option -g status-position top
set-option -g history-limit 100000
# Enable mouse mode (tmux 2.1 and above)
set -g mouse on
set -sg escape-time 0

# Pick a softer palette.
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @plugin 'tmux-plugins/tmux-logging'

set -g @logging-path "$HOME/tmux-logs"

set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_tabs_enabled on
set -ogq @catppuccin_window_text " #W"
set -ogq @catppuccin_window_current_text " #W"
set -ogq @catppuccin_window_flags_icon_format "##{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}##{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}##{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}##{?window_active,#{E:@catppuccin_window_flags_icon_current},}##{?window_last_flag,#{E:@catppuccin_window_flags_icon_last},}##{?window_marked_flag,#{E:@catppuccin_window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},} "
set -ogq @catppuccin_window_flags "icon"
set -ogq @catppuccin_window_flags_icon_last " 󰖰" # -
set -ogq @catppuccin_window_flags_icon_current " 󰖯" # *
set -ogq @catppuccin_window_flags_icon_zoom " 󰁌" # Z
set -ogq @catppuccin_window_flags_icon_mark " 󰃀" # M
set -ogq @catppuccin_window_flags_icon_silent " 󰂛" # ~
set -ogq @catppuccin_window_flags_icon_activity " 󱅫" # #
set -ogq @catppuccin_window_flags_icon_bell " 󰂞" # !

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?@popup_zoomed,#[bg=#{@catppuccin_peach}#,fg=#{@catppuccin_crust}#,bold]  󰁌 FULLSCREEN #[default] ,}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux

# Copy mode

set-option -g mouse on
setw -g mode-keys vi
set-option -s set-clipboard off
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter
unbind -n MouseDown3Pane

# use  'xclip -se c -i' for windows
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe 'wl-copy'\; send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'wl-copy'\; send-keys -X clear-selection

# Close the current full-screen popup and return to the background session.
# When @popup_zoomed=1 the outer client is showing the popup session directly
# (not a nested popup client), so detach-client would drop the whole tmux.
# Instead, clear the zoom state and switch back to the saved return session.
bind h if-shell '[ "$(tmux show-option -gqv @popup_zoomed)" = "1" ]' {
    run-shell '\
      ret=$(tmux show-option -gqv @zoom_return_session); \
      tmux set -gu @popup_zoomed; \
      tmux set -gu @zoom_return_session; \
      tmux set -gu @zoom_popup_session; \
      [ -n "$ret" ] && tmux switch-client -t "$ret"'
} {
    if-shell -F '#{==:#{session_name},btop}' 'detach-client' \
      'run-shell "tmux set -g @popup_outer_client \"#{client_name}\"; tmux set -g @popup_outer_session \"#{session_name}\""; display-popup -s "bg=terminal" -S "bg=terminal" -w 90% -h 85% -E "tmux new-session -A -s btop btop"'
}
bind g if-shell '[ "$(tmux show-option -gqv @popup_zoomed)" = "1" ]' {
    run-shell '\
      ret=$(tmux show-option -gqv @zoom_return_session); \
      tmux set -gu @popup_zoomed; \
      tmux set -gu @zoom_return_session; \
      tmux set -gu @zoom_popup_session; \
      [ -n "$ret" ] && tmux switch-client -t "$ret"'
} {
    if-shell -F '#{==:#{session_name},agency}' 'detach-client' \
      'run-shell "tmux set -g @popup_outer_client \"#{client_name}\"; tmux set -g @popup_outer_session \"#{session_name}\""; display-popup -s "bg=terminal" -S "bg=terminal" -w 90% -h 85% -E "tmux has-session -t agency 2>/dev/null && tmux attach -t agency || (tmux new-session -d -s agency -n copilot copilot && tmux new-window -t agency -n hermes hermes && tmux select-window -t agency:0 && tmux attach -t agency)"'
}

# Toggle popup ↔ full screen (Ctrl+s z)
# State: @popup_zoomed=1 means a popup session is currently shown full-screen
# Flow: popup → full-screen → popup (via bind g/h which re-open the popup)
# In a normal pane (not popup, not zoomed), fall through to default zoom behavior
# Note: bind g/h save @popup_outer_client and @popup_outer_session before opening popup
bind z if-shell '[ "$(tmux show-option -gqv @popup_zoomed)" = "1" ]' {
    # Full-screen → restore to popup
    run-shell '\
      ret=$(tmux show-option -gqv @zoom_return_session); \
      ps=$(tmux show-option -gqv @zoom_popup_session); \
      tmux set -gu @popup_zoomed; \
      tmux set -gu @zoom_return_session; \
      tmux set -gu @zoom_popup_session; \
      tmux switch-client -t "$ret"; \
      sleep 0.15; \
      tmux display-popup -s "bg=terminal" -S "bg=terminal" -w 90% -h 85% -E "tmux attach -t \"$ps\""'
} {
    # Check if we're inside a display-popup; if not, do normal pane zoom
    # Popup clients have client_termtype starting with "tmux" (nested tmux)
    if-shell 'tmux display-message -p "#{client_termtype}" | grep -q "^tmux"' {
        # Inside popup → go full-screen
        # Uses @popup_outer_client/@popup_outer_session saved by bind g/h
        run-shell '\
          oc=$(tmux show-option -gqv @popup_outer_client); \
          os=$(tmux show-option -gqv @popup_outer_session); \
          ps="#{session_name}"; \
          tmux set -g @popup_zoomed 1; \
          tmux set -g @zoom_return_session "$os"; \
          tmux set -g @zoom_popup_session "$ps"; \
          tmux detach-client; \
          sleep 0.15; \
          tmux switch-client -c "$oc" -t "$ps"'
    } {
        # Normal pane — default tmux zoom
        resize-pane -Z
    }
}

bind k move-pane -h -s "ssh-bg:." -t "0:."
bind l move-pane -v -s "ssh-bg:." -t "0:."

bind -n C-M-h swap-pane -d -t '{left-of}'
bind -n C-M-j swap-pane -d -t '{down-of}'
bind -n C-M-k swap-pane -d -t '{up-of}'
bind -n C-M-l swap-pane -d -t '{right-of}'

# Macro text (alt + 1)
bind -n M-1 send-keys "Some example macro text"

unbind -n MouseDown3Pane

run '~/.tmux/plugins/tpm/tpm'
